<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Olimpiada Ekologiczna App</title>

<style>
body{
  font-family: -apple-system,BlinkMacSystemFont;
  background: linear-gradient(135deg,#0f2027,#2c5364);
  color:white;
  margin:0;
  padding:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.app{
  width:100%;
  max-width:420px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation:fade .5s ease;
  transition: transform .2s;
}

.card:hover{
  transform: translateY(-3px);
}

button{
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#3ecf8e;
  color:white;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.03);
}

.answer{
  background:#ffffff15;
}

.correct{
  background:#1db954 !important;
}

.wrong{
  background:#ff4d4d !important;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

.progress{
  height:6px;
  background:#ffffff20;
  border-radius:6px;
  margin-bottom:20px;
  overflow:hidden;
}

.bar{
  height:100%;
  background:#3ecf8e;
  width:0%;
  transition:.3s;
}

.fadeIn{
  animation:fade .5s ease;
}

.hidden{
  display:none !important;
}
</style>
</head>

<body>

<div class="app">

<!-- Ekran logowania -->
<div id="login" class="card">
  <h2>🔐 Witaj w Olimpiadzie Ekologicznej</h2>
  <input type="password" id="password" placeholder="Wprowadź hasło" style="width:100%;padding:12px;border-radius:10px;border:none;margin:10px 0;">
  <button onclick="checkPassword()">Zaloguj</button>
  <p id="login-msg"></p>
</div>

<!-- Menu główne -->
<div id="menu" class="card hidden">
  <h2>🌍 Olimpiada Ekologiczna</h2>
  <button onclick="chooseCategory('szkolny')">Quiz szkolny</button>
  <button onclick="chooseCategory('okregowy')">Quiz okręgowy</button>
  <button onclick="chooseCategory('wojewodzki')">Quiz wojewódzki</button>
  <button onclick="chooseCategory('ustny')">Pytania ustne</button>
  <button onclick="showStats()">Statystyki</button>
</div>

<!-- Quiz -->
<div id="quiz" class="card hidden">
  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
  <h3 id="question"></h3>
  <div id="answers"></div>
  <button onclick="exitQuiz()">Wyjdź</button>
</div>

<!-- Statystyki -->
<div id="stats" class="card hidden">
  <h2>📊 Statystyki</h2>
  <p id="score"></p>
  <p id="repeats"></p>
  <button onclick="goMenu()">Powrót</button>
</div>

</div>

<script>
let allQuestions={
  szkolny:[
    {q:"Który gaz odpowiada głównie za efekt cieplarniany?",a:["Tlen","Dwutlenek węgla","Azot","Hel"],correct:1},
    {q:"Który biom jest najbogatszy w bioróżnorodność?",a:["Tundra","Pustynia","Las tropikalny","Step"],correct:2},
    {q:"Który proces usuwa CO₂ z atmosfery?",a:["Oddychanie","Fotosynteza","Spalanie","Parowanie"],correct:1}
  ],
  okregowy:[
    {q:"Który pierwiastek jest kluczowy dla eutrofizacji wód?",a:["Azot","Fosfor","Potas","Sód"],correct:1},
    {q:"Które zwierzę jest bioindykatorem czystości powietrza?",a:["Nietoperz","Sowa","Pszczoła","Mucha"],correct:2}
  ],
  wojewodzki:[
    {q:"Co to jest efekt albedo?",a:["Odbicie promieni słonecznych","Nagromadzenie CO₂","Topnienie lodowców","Ogrzewanie oceanu"],correct:0}
  ],
  ustny:[
    {q:"Wymień 3 główne źródła zanieczyszczenia wód.",a:[""],correct:0} // pytania ustne, odpowiedzi własne
  ]
};

let index=0;
let score=0;
let category="";
let repeats=[];

function checkPassword(){
  let pass=document.getElementById("password").value;
  if(pass==="ecoo"){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
  } else {
    document.getElementById("login-msg").innerText="❌ Niepoprawne hasło!";
  }
}

function chooseCategory(cat){
  category=cat;
  index=0;
  score=0;
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion(){
  let q=allQuestions[category][index];
  document.getElementById("question").innerText=q.q;
  let answers=document.getElementById("answers");
  answers.innerHTML="";
  
  // jeśli pytanie ustne, wstaw pole do wpisania odpowiedzi
  if(category==="ustny"){
    let input=document.createElement("input");
    input.type="text";
    input.style.width="100%";
    input.style.padding="12px";
    input.style.borderRadius="10px";
    input.style.border="none";
    answers.appendChild(input);
    let btn=document.createElement("button");
    btn.innerText="Zatwierdź";
    btn.onclick=()=>{score++; nextQuestion();};
    answers.appendChild(btn);
    return;
  }

  q.a.forEach((ans,i)=>{
    let btn=document.createElement("button");
    btn.innerText=ans;
    btn.className="answer";
    btn.onclick=()=>answer(btn,i);
    answers.appendChild(btn);
  });

  updateBar();
}

function answer(btn,i){
  let q=allQuestions[category][index];
  let buttons=document.querySelectorAll(".answer");
  buttons.forEach(b=>b.disabled=true);

  if(i===q.correct){
    btn.classList.add("correct");
    score++;
  }else{
    btn.classList.add("wrong");
    buttons[q.correct].classList.add("correct");
    repeats.push(q); // trafia do powtórek
  }

  setTimeout(nextQuestion,900);
}

function nextQuestion(){
  index++;
  if(index>=allQuestions[category].length){
    finish();
  } else {
    loadQuestion();
  }
}

function updateBar(){
  let percent=(index/allQuestions[category].length)*100;
  document.getElementById("bar").style.width=percent+"%";
}

function finish(){
  localStorage.setItem("score",score);
  localStorage.setItem("repeats",JSON.stringify(repeats));
  document.getElementById("quiz").classList.add("hidden");
  showStats();
}

function showStats(){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("stats").classList.remove("hidden");

  document.getElementById("score").innerText=
    "Ostatni wynik: "+localStorage.getItem("score")+"/"+(allQuestions[category].length);
  
  let rep=JSON.parse(localStorage.getItem("repeats") || "[]");
  document.getElementById("repeats").innerText=
    rep.length>0 ? "Powtórki: "+rep.map(r=>r.q).join("; ") : "Brak powtórek!";
}

function goMenu(){
  document.getElementById("stats").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

function exitQuiz(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}
</script>

</body>
</html>
